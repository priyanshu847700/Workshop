<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <style>
        body { font-family: Arial; text-align: center; }
        #chatbox {
            width: 300px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
        }
        .msg { margin: 5px; }
        /* Reset default margin */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Navbar styling */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #333;
    padding: 15px 30px;
}

/* Logo */
.logo {
    color: white;
    font-size: 22px;
    font-weight: bold;
}

/* Nav links */
.nav-links {
    list-style: none;
    display: flex;
}

.nav-links li {
    margin-left: 20px;
}

/* Links */
.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 16px;
    transition: 0.3s;
}

/* Hover effect */
.nav-links a:hover {
    color: #00ffcc;
}
    </style>
</head>
<body>
  
<nav class="navbar">
    <div class="logo">MyLogo</div>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>
<div style="height: 300px;">

</div>

<h2>Simple Chatbot 🤖</h2>

<div id="chatbox"></div>

<input type="text" id="input" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
    let input = document.getElementById("input");
    let message = input.value.trim();

    if (!message) return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class='msg'>You: ${message}</div>`;

    let res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    });

    let data = await res.json();

    chatbox.innerHTML += `<div class='msg'>Bot: ${data.response}</div>`;

    input.value = "";
    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
