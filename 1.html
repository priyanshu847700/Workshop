
<!DOCTYPE html>
<html>
<head>
    <title>Modern Chatbot UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 22px; font-weight: bold; }

        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 20px; }
        .nav-links a {
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #00ffcc; }

        .chat-container {
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .chat-header { text-align: center; margin-bottom: 15px; }

        #chatbox {
            height: 350px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }

        .user {
            align-self: flex-end;
            background: #00ffcc;
            color: black;
            flex-direction: row-reverse;
        }

        .bot {
            align-self: flex-start;
            background: #444;
        }

        .icon {
            width: 22px;
            height: 22px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex;
            margin-top: 15px;
            gap: 10px;
        }

        #input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: #00ffcc;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); }

        #chatbox::-webkit-scrollbar { width: 5px; }
        #chatbox::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">MyChat</div>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="chat-container">
    <div class="chat-header">
        <h2>🤖 Smart Chatbot</h2>
    </div>

    <div id="chatbox"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Type a message..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">
            Send
            <!-- Send Icon -->
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                <path d="M22 2L11 13"></path>
                <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
            </svg>
        </button>
    </div>
</div>

<script>
function getIcon(type) {
    if (type === "user") {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M5.5 21a8.38 8.38 0 0 1 13 0"></path>
                </svg>`;
    } else {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                    <circle cx="12" cy="5" r="2"></circle>
                    <path d="M12 7v4"></path>
                </svg>`;
    }
}

function addMessage(text, sender) {
    const chatbox = document.getElementById("chatbox");
    const msg = document.createElement("div");
    msg.classList.add("msg", sender);

    msg.innerHTML = `${getIcon(sender)} <span>${text}</span>`;

    chatbox.appendChild(msg);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function handleKey(e) {
    if (e.key === "Enter") sendMessage();
}

async function sendMessage() {
    const input = document.getElementById("input");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    addMessage("Typing...", "bot");

    const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
    });

    const data = await res.json();

    const chatbox = document.getElementById("chatbox");
    chatbox.removeChild(chatbox.lastChild);

    addMessage(data.response, "bot");
}
</script>

</body>
</html>
